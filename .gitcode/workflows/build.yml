name: Build OpenHarmony FileBrowser Linux x64 (GitCode)

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'OpenHarmony_FileBrowser_V*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install system dependencies (Qt)
        run: |
          echo "=== Diagnostic: Check Python 3 paths ==="
          echo "--- /usr/bin/python3* ---"
          find /usr/bin -maxdepth 1 -name "python3*" -exec ls -la {} + 2>&1 || echo "No python3* found in /usr/bin"
          echo "--- /usr/libexec/platform-python* ---"
          find /usr/libexec -maxdepth 1 -name "platform-python*" -exec ls -la {} + 2>&1 || echo "No platform-python* found in /usr/libexec"
          echo "--- /usr/bin/python ---"
          ls -la /usr/bin/python 2>&1 || echo "No /usr/bin/python found"
          echo "--- /bin/yum shebang ---"
          head -1 /bin/yum 2>&1 || echo "Cannot read /bin/yum"
          echo "--- /etc/yum.repos.d/ contents ---"
          ls -la /etc/yum.repos.d/ 2>&1 || echo "No /etc/yum.repos.d/ directory"
          echo "--- Existing repo files ---"
          for f in /etc/yum.repos.d/*.repo; do [ -e "$f" ] && echo "FILE: $f" && grep -E "^\[|^name=|^baseurl=|^enabled=" "$f" 2>&1; done || echo "No .repo files found"

          echo "=== Fix: Determine Python for yum ==="
          YUM_PYTHON="/usr/bin/python3"
          if [ ! -e /usr/bin/python3 ]; then
            YUM_PYTHON=$(find /usr/bin /usr/libexec -maxdepth 1 -name "python3.[0-9]*" -type f 2>/dev/null | sort -V | tail -1)
            if [ -n "$YUM_PYTHON" ]; then
              echo "WARNING: /usr/bin/python3 not found, using $YUM_PYTHON for yum"
            else
              echo "ERROR: Cannot find any python3.x binary"
              exit 1
            fi
          fi

          echo "=== Fix: Check yum repositories ==="
          REPO_LIST=$($YUM_PYTHON /usr/bin/yum repolist 2>&1)
          echo "$REPO_LIST"
          REPO_COUNT=$(echo "$REPO_LIST" | grep -c "repo-id" || true)
          echo "Active repo count: $REPO_COUNT"

          if [ "$REPO_COUNT" -eq 0 ]; then
            echo "No repos found, adding CentOS 8 vault repos from TUNA mirror..."
            echo "Writing to /etc/yum.repos.d/CentOS-Vault.repo..."
            cat > /etc/yum.repos.d/CentOS-Vault.repo << 'REPOEOF'
[baseos]
name=CentOS-8 - BaseOS - TUNA
baseurl=https://mirrors.tuna.tsinghua.edu.cn/centos-vault/8.5.2111/BaseOS/$basearch/os/
enabled=1
gpgcheck=0

[appstream]
name=CentOS-8 - AppStream - TUNA
baseurl=https://mirrors.tuna.tsinghua.edu.cn/centos-vault/8.5.2111/AppStream/$basearch/os/
enabled=1
gpgcheck=0
REPOEOF
            echo "Repo config written. Verifying..."
            cat /etc/yum.repos.d/CentOS-Vault.repo
          else
            echo "Repos already configured, skipping repo setup."
          fi

          echo "=== Install Qt system dependencies ==="
          $YUM_PYTHON /usr/bin/yum install -y fontconfig mesa-libEGL mesa-libGL libxcb xcb-util xcb-util-image xcb-util-keysyms xcb-util-renderutil xcb-util-wm

      - name: Install Python via Miniconda
        run: |
          curl -O https://mirrors.tuna.tsinghua.edu.cn/anaconda/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b -p $HOME/miniconda
          export PATH="$HOME/miniconda/bin:$PATH"
          conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
          conda config --set show_channel_urls yes
          conda create -n py311 python=3.11.9 -y
          source $HOME/miniconda/bin/activate py311
          python --version
          python -c "import sysconfig; print(sysconfig.get_config_var('Py_ENABLE_SHARED'))"

      - name: Configure pip mirror
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          mkdir -p ~/.pip
          echo "[global]" > ~/.pip/pip.conf
          echo "index-url = https://pypi.tuna.tsinghua.edu.cn/simple" >> ~/.pip/pip.conf
          echo "timeout = 120" >> ~/.pip/pip.conf

      - name: Install test dependencies
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check code formatting (black)
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          black --check src/ tests/

      - name: Lint code (flake8)
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          flake8 src/ tests/ --max-line-length=120

      - name: Run pytest with coverage
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          export LD_LIBRARY_PATH=/usr/lib64:$LD_LIBRARY_PATH
          QT_QPA_PLATFORM=offscreen python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Run type check (mypy)
        run: |
          cd repo_workspace
          source $HOME/miniconda/bin/activate py311
          python -m mypy src/ --ignore-missing-imports --no-error-summary || true

  build:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install system dependencies (Qt)
        run: |
          echo "=== Diagnostic: Check Python 3 paths ==="
