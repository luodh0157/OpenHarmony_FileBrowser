name: Build OpenHarmony FileBrowser Linux x64 (GitCode)

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'OpenHarmony_FileBrowser_V*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install Python via Miniconda
        run: |
          curl -O https://mirrors.tuna.tsinghua.edu.cn/anaconda/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b -p $HOME/miniconda
          printf 'channels:\n  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main\n  - conda-forge\ncustom_multichannels:\n  defaults:\n    - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main\nshow_channel_urls: true\nchannel_priority: strict\n' > ~/.condarc
          echo "=== .condarc contents ==="
          cat ~/.condarc
          echo "=== Create py311 environment ==="
          $HOME/miniconda/bin/conda create -n py311 python=3.11.9 -y
          echo "=== Verify Python ==="
          $HOME/miniconda/envs/py311/bin/python --version
          $HOME/miniconda/envs/py311/bin/python -c "import sysconfig; print(sysconfig.get_config_var('Py_ENABLE_SHARED'))"

      - name: Install Qt dependencies via conda
        run: |
          echo "=== Install fontconfig, libxcb via conda-forge ==="
          $HOME/miniconda/bin/conda install -n py311 -y -c conda-forge fontconfig libxcb
          echo "=== Verify installed libraries ==="
          ls -la $HOME/miniconda/envs/py311/lib/libfontconfig* 2>&1 || true

      - name: Install dependencies and run checks
        run: |
          cd repo_workspace
          CONDA_PYTHON="$HOME/miniconda/envs/py311/bin/python"
          CONDA_PIP="$HOME/miniconda/envs/py311/bin/pip"
          CONDA_BIN="$HOME/miniconda/envs/py311/bin"
          export PATH="$CONDA_BIN:$PATH"
          export LD_LIBRARY_PATH="$HOME/miniconda/envs/py311/lib:$LD_LIBRARY_PATH"

          echo "=== Configure pip mirror ==="
          mkdir -p ~/.pip
          printf '[global]\nindex-url = https://pypi.tuna.tsinghua.edu.cn/simple\ntimeout = 120\n' > ~/.pip/pip.conf

          echo "=== Install test dependencies ==="
          $CONDA_PIP install --upgrade pip
          $CONDA_PIP install -r requirements.txt
          $CONDA_PIP install -r requirements-dev.txt

          echo "=== Check code formatting (black) ==="
          $CONDA_BIN/black --check src/ tests/

          echo "=== Lint code (flake8) ==="
          $CONDA_BIN/flake8 src/ tests/ --max-line-length=120

          echo "=== Run pytest with coverage ==="
          QT_QPA_PLATFORM=offscreen $CONDA_PYTHON -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

          echo "=== Run type check (mypy) ==="
          $CONDA_PYTHON -m mypy src/ --ignore-missing-imports --no-error-summary || true

  build:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install Python via Miniconda
        run: |
          curl -O https://mirrors.tuna.tsinghua.edu.cn/anaconda/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b -p $HOME/miniconda
          printf 'channels:\n  - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main\n  - conda-forge\ncustom_multichannels:\n  defaults:\n    - https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main\nshow_channel_urls: true\nchannel_priority: strict\n' > ~/.condarc
          echo "=== .condarc contents ==="
          cat ~/.condarc
          echo "=== Create py311 environment ==="
          $HOME/miniconda/bin/conda create -n py311 python=3.11.9 -y
          echo "=== Verify Python ==="
          $HOME/miniconda/envs/py311/bin/python --version
          $HOME/miniconda/envs/py311/bin/python -c "import sysconfig; print(sysconfig.get_config_var('Py_ENABLE_SHARED'))"

      - name: Install Qt dependencies via conda
        run: |
          echo "=== Install fontconfig, libxcb via conda-forge ==="
          $HOME/miniconda/bin/conda install -n py311 -y -c conda-forge fontconfig libxcb
          echo "=== Verify installed libraries ==="
          ls -la $HOME/miniconda/envs/py311/lib/libfontconfig* 2>&1 || true

      - name: Install dependencies and build
        run: |
          cd repo_workspace
          CONDA_PYTHON="$HOME/miniconda/envs/py311/bin/python"
          CONDA_PIP="$HOME/miniconda/envs/py311/bin/pip"
          CONDA_BIN="$HOME/miniconda/envs/py311/bin"
          export PATH="$CONDA_BIN:$PATH"
          export LD_LIBRARY_PATH="$HOME/miniconda/envs/py311/lib:$LD_LIBRARY_PATH"

          echo "=== Configure pip mirror ==="
          mkdir -p ~/.pip
          printf '[global]\nindex-url = https://pypi.tuna.tsinghua.edu.cn/simple\ntimeout = 120\n' > ~/.pip/pip.conf

          echo "=== Install build dependencies ==="
          $CONDA_PIP install --upgrade pip
          $CONDA_PIP install -r requirements.txt
          $CONDA_PIP install pyinstaller

          echo "=== Build PyInstaller executable ==="
          $CONDA_PYTHON package/build.py

          echo "=== Create distribution archive ==="
          cd dist
          tar czf OpenHarmonyFileBrowser-Linux-x64.tar.gz OpenHarmonyFileBrowser/

          echo "=== Check build output ==="
          cd ..
          if [ -d "dist/OpenHarmonyFileBrowser" ]; then
            echo "Build output found at: dist/OpenHarmonyFileBrowser"
            ls -la dist/
          else
            echo "::error::Build output not found"
            exit 1
          fi
