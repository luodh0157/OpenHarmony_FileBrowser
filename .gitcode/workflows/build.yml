          echo "--- /usr/libexec/platform-python* ---"
          find /usr/libexec -maxdepth 1 -name "platform-python*" -exec ls -la {} + 2>&1 || echo "No platform-python* found in /usr/libexec"
          echo "--- /usr/bin/python ---"
