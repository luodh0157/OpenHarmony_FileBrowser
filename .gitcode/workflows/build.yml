name: Build OpenHarmony FileBrowser Linux x64 (GitCode)

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'OpenHarmony_FileBrowser_V*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test-all:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install Python via Miniconda
        run: |
          curl -O https://mirrors.tuna.tsinghua.edu.cn/anaconda/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b -p $HOME/miniconda
          export PATH="$HOME/miniconda/bin:$PATH"
          conda config --remove channels defaults
          conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
          conda config --set show_channel_urls yes
          conda create -n py311 python=3.11.9 -y
          $HOME/miniconda/bin/conda run -n py311 python --version
          $HOME/miniconda/bin/conda run -n py311 python -c "import sysconfig; print(sysconfig.get_config_var('Py_ENABLE_SHARED'))"

      - name: Install Qt dependencies via conda
        run: |
          echo "=== Install fontconfig, libxcb, mesa via conda-forge ==="
          $HOME/miniconda/bin/conda run -n py311 conda install -y --override-channels -c conda-forge fontconfig libxcb mesa-libgl-devel
          echo "=== Verify installed libraries ==="
          ls -la $HOME/miniconda/envs/py311/lib/libfontconfig* 2>&1 || true

      - name: Configure pip mirror
        run: |
          cd repo_workspace
          mkdir -p ~/.pip
          echo "[global]" > ~/.pip/pip.conf
          echo "index-url = https://pypi.tuna.tsinghua.edu.cn/simple" >> ~/.pip/pip.conf
          echo "timeout = 120" >> ~/.pip/pip.conf

      - name: Install test dependencies
        run: |
          cd repo_workspace
          export LD_LIBRARY_PATH=$HOME/miniconda/envs/py311/lib:$LD_LIBRARY_PATH
          $HOME/miniconda/bin/conda run -n py311 pip install --upgrade pip
          $HOME/miniconda/bin/conda run -n py311 pip install -r requirements.txt
          $HOME/miniconda/bin/conda run -n py311 pip install -r requirements-dev.txt

      - name: Check code formatting (black)
        run: |
          cd repo_workspace
          $HOME/miniconda/bin/conda run -n py311 black --check src/ tests/

      - name: Lint code (flake8)
        run: |
          cd repo_workspace
          $HOME/miniconda/bin/conda run -n py311 flake8 src/ tests/ --max-line-length=120

      - name: Run pytest with coverage
        run: |
          cd repo_workspace
          export LD_LIBRARY_PATH=$HOME/miniconda/envs/py311/lib:$LD_LIBRARY_PATH
          $HOME/miniconda/bin/conda run -n py311 bash -c "QT_QPA_PLATFORM=offscreen python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing"

      - name: Run type check (mypy)
        run: |
          cd repo_workspace
          $HOME/miniconda/bin/conda run -n py311 python -m mypy src/ --ignore-missing-imports --no-error-summary || true

  build:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1

      #- name: Setup Python
      #  uses: setup-python@0.0.1
      #  with:
      #    python-version: '3.8.18' # 打包会失败，报错：ERROR: Python was built without a shared library, which is required by PyInstaller.

      - name: Install Python via Miniconda
        run: |
          curl -O https://mirrors.tuna.tsinghua.edu.cn/anaconda/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b -p $HOME/miniconda
          export PATH="$HOME/miniconda/bin:$PATH"
          conda config --remove channels defaults
          conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
          conda config --set show_channel_urls yes
          conda create -n py311 python=3.11.9 -y
          $HOME/miniconda/bin/conda run -n py311 python --version
          $HOME/miniconda/bin/conda run -n py311 python -c "import sysconfig; print(sysconfig.get_config_var('Py_ENABLE_SHARED'))"

      - name: Install Qt dependencies via conda
        run: |
          echo "=== Install fontconfig, libxcb, mesa via conda-forge ==="
          $HOME/miniconda/bin/conda run -n py311 conda install -y --override-channels -c conda-forge fontconfig libxcb mesa-libgl-devel
          echo "=== Verify installed libraries ==="
          ls -la $HOME/miniconda/envs/py311/lib/libfontconfig* 2>&1 || true

      - name: Configure pip mirror
        run: |
          cd repo_workspace
          mkdir -p ~/.pip
          echo "[global]" > ~/.pip/pip.conf
          echo "index-url = https://pypi.tuna.tsinghua.edu.cn/simple" >> ~/.pip/pip.conf
          echo "timeout = 120" >> ~/.pip/pip.conf

      - name: Install build dependencies
        run: |
          cd repo_workspace
          export LD_LIBRARY_PATH=$HOME/miniconda/envs/py311/lib:$LD_LIBRARY_PATH
          $HOME/miniconda/bin/conda run -n py311 pip install --upgrade pip
          $HOME/miniconda/bin/conda run -n py311 pip install -r requirements.txt
          $HOME/miniconda/bin/conda run -n py311 pip install pyinstaller

      - name: Build PyInstaller executable
        run: |
          cd repo_workspace
          $HOME/miniconda/bin/conda run -n py311 python package/build.py

      - name: Create distribution archive
        run: |
          cd repo_workspace
          $HOME/miniconda/bin/conda run -n py311 bash -c "cd dist && tar czf OpenHarmonyFileBrowser-Linux-x64.tar.gz OpenHarmonyFileBrowser/"

      - name: Check build output
        run: |
          cd repo_workspace
          if [ -d "dist/OpenHarmonyFileBrowser" ]; then
            echo "Build output found at: dist/OpenHarmonyFileBrowser"
            ls -la dist/
          else
            echo "::error::Build output not found"
            exit 1
          fi
