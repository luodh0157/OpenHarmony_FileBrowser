name: Test OpenHarmony FileBrowser (GitHub)

on:
  workflow_call:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-all:
    name: Run All Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies (Qt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libgl1
          sudo apt-get install -y -qq libxcb-xinerama0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xfixes0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check code formatting (black)
        run: black --check src/ tests/

      - name: Lint code (flake8)
        run: flake8 src/ tests/ --max-line-length=120

      - name: Run type check (mypy)
        run: mypy src/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
        env:
          QT_QPA_PLATFORM: offscreen
